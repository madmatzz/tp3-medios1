<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpieza Profunda</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kay+Pho+Du:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
    }
    
    #figma-wrapper {
      width: 100%;
      position: relative;
      background: black;
      overflow: hidden;
    }

    #figma-container {
      width: 1440px;
      height: 7750px;
      position: absolute;
      top: 0;
      left: 0;
      background: black;
      transform-origin: top left; /* Vital para que el escalado sea perfecto hacia la derecha y abajo */
    }

    .cursor::after {
      content: '|';
      animation: blink 1s step-end infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  
  <div id="figma-wrapper">
    <div id="figma-container">
      
      <div style="width: 712px; height: 388px; left: 366px; top: 799px; position: absolute; overflow: hidden">
        <img style="width: 779px; height: 446px; left: -34px; top: -4px; position: absolute; border: 3px black solid" src="principio fabrica.gif" alt="Principio Fabrica" />
      </div>
      <div style="width: 978px; height: 416px; left: 235px; top: 1272px; position: absolute; overflow: hidden">
        <img style="width: 779px; height: 333px; left: 98px; top: 61px; position: absolute; outline: 3px black solid" src="Limpiando.gif" alt="Limpiando" />
      </div>
      <div style="width: 210px; height: 201px; left: 252px; top: 1811px; position: absolute; overflow: hidden">
        <img style="width: 234px; height: 231px; left: -15px; top: -15px; position: absolute; border: 3px black solid" src="oreja.gif" alt="Oreja" />
      </div>
      <div style="width: 450px; height: 499px; left: 503px; top: 1880px; position: absolute; overflow: hidden">
        <img style="width: 502px; height: 557px; left: -27px; top: -7px; position: absolute; border: 3px black solid" src="mano.gif" alt="Mano" />
      </div>
      <div style="width: 208px; height: 305px; left: 998px; top: 2168px; position: absolute; overflow: hidden">
        <img style="width: 237px; height: 343px; left: -5px; top: -5px; position: absolute; border: 3px black solid" src="ojo.gif" alt="Ojo" />
      </div>
      <div style="width: 709px; height: 538px; left: 366px; top: 2939px; position: absolute; overflow: hidden">
        <img style="width: 790px; height: 637px; left: -8px; top: -25px; position: absolute" src="charla corregido.gif" alt="Charla" />
      </div>
      <div style="width: 700px; height: 524px; left: 369px; top: 3929px; position: absolute; overflow: hidden">
        <img style="width: 779px; height: 584px; left: -39px; top: -5px; position: absolute; border: 3px black solid" src="secuestr0.gif" alt="Secuestro" />
      </div>
      <div style="width: 234px; height: 290px; left: 226px; top: 4927px; position: absolute; overflow: hidden">
        <img style="width: 257px; height: 317px; left: -8px; top: -9px; position: absolute" src="balde.gif" alt="Balde" />
      </div>
      <div style="width: 706px; height: 425px; left: 363px; top: 5691px; position: absolute; overflow: hidden">
        <img style="width: 1074px; height: 473px; left: -183px; top: -4px; position: absolute; border: 3px black solid" src="Gif Auto.gif" alt="Gif Auto" />
      </div>
      <div style="width: 327px; height: 462px; left: 556px; top: 6695px; position: absolute; overflow: hidden">
        <img style="width: 358px; height: 482px; left: -15px; top: -10px; position: absolute" src="final.gif" alt="Final" />
      </div>
      
      <div style="width: 1283px; height: 130px; left: 78px; top: 257px; position: absolute; text-align: center; color: white; font-size: 64px; font-family: 'Kay Pho Du', sans-serif; font-weight: 700; word-wrap: break-word">
        <span id="typewriter-text" class="cursor"></span>
      </div>

    </div>
  </div>

  <script>
    // ----------------------------------------------------
    // LÓGICA DE ESCALADO RESPONSIVO MEJORADA PARA MOBILE
    // ----------------------------------------------------
    function scaleLayout() {
      const wrapper = document.getElementById('figma-wrapper');
      const container = document.getElementById('figma-container');
      
      const baseWidth = 1440;
      const baseHeight = 7750;
      
      const currentWidth = window.innerWidth;
      let scale = currentWidth / baseWidth;
      
      if (scale >= 1) {
        // En escritorio (más de 1440px), no escalamos, pero lo centramos
        scale = 1;
        container.style.transform = `scale(1)`;
        // Calcular margen izquierdo para centrar
        const leftMargin = (currentWidth - baseWidth) / 2;
        container.style.left = `${leftMargin}px`;
      } else {
        // En móvil/tablet, aplicamos la escala desde la esquina superior izquierda
        container.style.transform = `scale(${scale})`;
        container.style.left = '0px';
      }
      
      // Ajustamos el alto del wrapper para que la página termine justo donde debe
      wrapper.style.height = `${baseHeight * scale}px`;
    }

    window.addEventListener('resize', scaleLayout);
    window.addEventListener('orientationchange', () => {
      setTimeout(scaleLayout, 100); // Pequeño retraso al girar para que el navegador actualice width
    });
    
    // Ejecutar al cargar la página y justo después de unos milisegundos para evitar errores de renderizado en iOS
    scaleLayout();
    setTimeout(scaleLayout, 50);

    // ----------------------------------------------------
    // MÁQUINA DE ESCRIBIR
    // ----------------------------------------------------
    const textElement = document.getElementById("typewriter-text");
    const text = "#Operación M.O.P.A";
    let isDeleting = false;
    let textIndex = 0;
    
    function typeWriter() {
      let speed = isDeleting ? 100 : 150;
      
      if (!isDeleting && textIndex === text.length) {
        speed = 2500;
        isDeleting = true;
      } 
      else if (isDeleting && textIndex === 0) {
        speed = 1000;
        isDeleting = false;
      }
      
      textElement.textContent = text.substring(0, textIndex);
      
      if (isDeleting) {
        textIndex--;
      } else {
        textIndex++;
      }
      
      setTimeout(typeWriter, speed);
    }
    
    setTimeout(typeWriter, 1000);
  </script>
</body>
</html>
