    .cursor::after {
      content: '|';
      animation: blink 1s step-end infinite;

    @keyframes blink {

      50% { opacity: 0; }
    }

  <script>
    // ----------------------------------------------------
    // AUDIO DE FONDO (YOUTUBE API)
    // ----------------------------------------------------
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('youtube-audio', {
        height: '10',
        width: '10',
        videoId: 'LhqUpcVHFAI',
        playerVars: {
          'autoplay': 1,
          'loop': 1,
          'playlist': 'LhqUpcVHFAI',
          'controls': 0
        },
        events: {
          'onReady': onPlayerReady
        }
      });
    }

    function onPlayerReady(event) {
      event.target.playVideo();
      
      const playAudio = () => {
        if (player && typeof player.getPlayerState === 'function' && player.getPlayerState() !== YT.PlayerState.PLAYING) {
          player.playVideo();
        }
      };
      
      document.body.addEventListener('click', playAudio);
      document.body.addEventListener('touchstart', playAudio);
    }

    // ----------------------------------------------------
    // LÓGICA DE ESCALADO RESPONSIVO MEJORADA PARA MOBILE
    // ----------------------------------------------------
    function scaleLayout() {
      const wrapper = document.getElementById('figma-wrapper');
      const container = document.getElementById('figma-container');
      
      const baseWidth = 1440;
      const baseHeight = 8450; // ¡Actualizado al nuevo height de Figma!
      
      const currentWidth = window.innerWidth;
      let scale = currentWidth / baseWidth;
      
      if (scale >= 1) {
        scale = 1;
        container.style.transform = `scale(1)`;
        const leftMargin = (currentWidth - baseWidth) / 2;
        container.style.left = `${leftMargin}px`;
      } else {
        container.style.transform = `scale(${scale})`;
        container.style.left = '0px';
      }
      
      wrapper.style.height = `${baseHeight * scale}px`;
    }

    window.addEventListener('resize', scaleLayout);
    window.addEventListener('orientationchange', () => {
      setTimeout(scaleLayout, 100);
    });
    
    scaleLayout();
    setTimeout(scaleLayout, 50);

    // ----------------------------------------------------
    // MÁQUINA DE ESCRIBIR
    // ----------------------------------------------------
    const textElement = document.getElementById("typewriter-text");
    const text = "#Operación M.O.P.A";
    let isDeleting = false;
    let textIndex = 0;
    
    function typeWriter() {
      let speed = isDeleting ? 100 : 150;
      
      if (!isDeleting && textIndex === text.length) {
        speed = 2500;
        isDeleting = true;
      } 
      else if (isDeleting && textIndex === 0) {
        speed = 1000;
        isDeleting = false;
      }
      
      textElement.textContent = text.substring(0, textIndex);
      
      if (isDeleting) {
        textIndex--;
      } else {
        textIndex++;
      }
      
      setTimeout(typeWriter, speed);
    }
    
    setTimeout(typeWriter, 1000);
  </script>
